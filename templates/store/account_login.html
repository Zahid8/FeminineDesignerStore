{% extends "base.html" %}
{% block title %} — Login{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container-lg">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <h2 class="mb-4">Sign In</h2>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-dark w-100">Sign In</button>
        </form>
        <p class="mt-3 text-center">
          Don't have an account? <a href="{% url 'account_register' %}">Register here</a>.
        </p>
      </div>
    </div>
  </div>
</section>
{% endblock %}
